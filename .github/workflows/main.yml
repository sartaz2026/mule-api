name: Mule CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 8
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Maven 3.8.6
        uses: stCarolas/setup-maven@v4
        with:
          maven-version: 3.8.6

      - name: Build Mule App
        run: mvn -B clean package

      - name: Deploy to CloudHub
        run: |
          mvn -B clean deploy -DmuleDeploy \
          -Danypoint.clientId=${{ secrets.ANYPOINT_CLIENT_ID }} \
          -Danypoint.clientSecret=${{ secrets.ANYPOINT_CLIENT_SECRET }}
